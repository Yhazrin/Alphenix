name: multicode

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: multicode
      POSTGRES_USER: ${POSTGRES_USER:-multicode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multicode}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
